<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导师观察台</title>
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <header class="topbar">
    <h1>导师观察台</h1>
    <span id="ws-status" class="ws-status">未连接</span>
  </header>

  <main class="layout">
    <!-- 左栏：学员列表 -->
    <section class="panel panel-students">
      <h2>学员</h2>
      <ul id="student-list" class="student-list"></ul>
    </section>

    <!-- 中栏：对话列表 -->
    <section class="panel panel-sessions">
      <h2>对话</h2>
      <!-- 针对当前选中学员：触发学员机上传全部对话（未选中学员时禁用） -->
      <button id="sync-student" class="sync-btn" type="button" disabled>⟳ 同步该学员全部对话</button>
      <div id="sync-feedback" class="sync-feedback" hidden></div>
      <button id="retry-analysis" class="retry-analysis-btn" type="button" hidden>仅重试诊断</button>
      <ul id="session-list" class="session-list"></ul>
    </section>

    <!-- 右栏：时间线 -->
    <section class="panel panel-timeline">
      <h2>时间线</h2>

      <!-- 会话级单一入口：查看整段对话原文（懒加载，与逐条摘要解耦） -->
      <details id="transcript-entry" class="transcript-entry" hidden>
        <summary>查看完整对话原文</summary>
        <div id="transcript-body" class="transcript-body pending"></div>
      </details>

      <div id="timeline" class="timeline"></div>

      <!-- 发消息：定向当前学员 -->
      <form id="compose" class="compose" autocomplete="off">
        <input id="compose-input" type="text"
               placeholder="选中学员后可发送提示…（不改 AI，仅提示学员）" disabled />
        <button id="compose-send" type="submit" disabled>发送</button>
      </form>

      <!-- 四色类型图例：色块同步卡片背景色 -->
      <div class="legend">
        <span><span class="sw" style="background:#fef9c3"></span>学员提问</span>
        <span><span class="sw" style="background:#dcfce7"></span>AI 回复摘要</span>
        <span><span class="sw" style="background:#eff6ff"></span>学习诊断</span>
        <span><span class="sw" style="background:#fdf2f8"></span>导师提示（出站）</span>
      </div>
    </section>
  </main>

  <script src="app.js?v=12"></script>
</body>
</html>
