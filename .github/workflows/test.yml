name: Test

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: >
          pip install
          -r requirements-server.txt
          pytest
          pytest-asyncio

      - name: Run server tests
        run: >
          python -m pytest tests/
          -q --tb=short
          -m "not (macos or student or windows or e2e)"
          --ignore=tests/fixtures
          --ignore=tests/test_platform_imports.py
          --ignore=tests/test_floating_native_phase3.py
          --ignore=tests/e2e/test_student_agent_system.py
          --ignore=tests/test_deploy_config.py
          --ignore=tests/test_single_worker_startup.py