[pytest]
testpaths = tests
strict_markers = true
markers =
    critical: release-blocking test; a runtime skip is converted to a failure
    contract: wire format, import boundary, or public interface contract
    unit: isolated deterministic behavior
    integration: collaboration between real in-process components
    component: real process, socket, browser, or agent component lane
    real_machine: manual or automated gate requiring actual platform software
    server: central server lane
    core: platform-neutral Student Core lane
    macos: macOS adapter or native UI lane
    windows: Windows adapter or installer lane
